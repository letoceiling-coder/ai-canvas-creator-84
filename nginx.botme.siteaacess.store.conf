# Эталон HTTP (до Certbot). После `certbot --nginx` nginx дописывает блок 443 сам.

server {
    listen 80;
    listen [::]:80;
    server_name botme.siteaacess.store;

    # SSE-заглушка: Vite preview отдаёт HTML на GET /api/* — на проде задаём 204 в nginx (только этот vhost).
    location = /api/chat/stream {
        return 204;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Долгие вызовы createServerFn / runPipeline (Ollama) — иначе nginx отдаёт 504
        proxy_connect_timeout 600s;
        proxy_send_timeout 1800s;
        proxy_read_timeout 1800s;
        send_timeout 1800s;
    }
}

# На проде (2026-05): тот же `location = /api/chat/stream` добавлен в HTTPS-server { ... } первым блоком перед location /.
